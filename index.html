<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riemann Sum Calculator (x²)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        .function-banner {
            text-align: center;
            font-size: 1.2rem;
            background: #eef2f3;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #results {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 5px solid #2ecc71;
            border-radius: 4px;
        }
        .result-item {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .chart-container {
            position: relative;
            margin-top: 30px;
            height: 400px;
            width: 100%;
        }
        #prompt-box {
            display: none;
            text-align: center;
            margin-top: 25px;
            padding: 20px;
            background: #fff8db;
            border: 1px solid #f1c40f;
            border-radius: 5px;
        }
        #prompt-box button {
            display: inline-block;
            width: auto;
            padding: 10px 30px;
            background-color: #27ae60;
            margin-top: 10px;
        }
        #prompt-box button:hover {
            background-color: #219653;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Riemann Sum Visualizer</h1>
    <div class="function-banner">Function: f(x) = x<sup>2</sup></div>

    <div id="calculator-form">
        <div class="form-group">
            <label for="type">Approximation Type:</label>
            <select id="type">
                <option value="LRAM">LRAM (Left Riemann Sum)</option>
                <option value="RRAM">RRAM (Right Riemann Sum)</option>
                <option value="MRAM">MRAM (Midpoint Riemann Sum)</option>
                <option value="TRAP">Trapezoidal Rule</option>
            </select>
        </div>

        <div class="form-group">
            <label for="a">Lower x value (a):</label>
            <input type="number" id="a" step="any" value="0" required>
        </div>

        <div class="form-group">
            <label for="b">Higher x value (b):</label>
            <input type="number" id="b" step="any" value="3" required>
        </div>

        <div class="form-group">
            <label for="n">Number of Subdivisions (n):</label>
            <input type="number" id="n" min="1" max="200" value="6" required>
        </div>

        <button type="button" id="calculate-btn" onclick="calculate()">Calculate & Graph</button>
    </div>

    <div id="results" style="display: none;">
        <h2>Results</h2>
        <div class="result-item"><strong>Approximation Value:</strong> <span id="approx-val">0</span></div>
        <div class="result-item"><strong>Exact Value (Integral):</strong> <span id="exact-val">0</span></div>
        <div class="result-item"><strong>Absolute Error:</strong> <span id="error-val">0</span></div>
        
        <div class="chart-container">
            <canvas id="riemannChart"></canvas>
        </div>

        <div id="prompt-box">
            <p>Would you like to try another approximation?</p>
            <button onclick="resetForm()">Yes</button>
        </div>
    </div>
</div>

<script>
    let chartInstance = null;

    // Define target function: f(x) = x^2
    function f(x) {
        return x * x;
    }

    // Exact definite integral of x^2 from a to b: (b^3)/3 - (a^3)/3
    function exactIntegral(a, b) {
        return (Math.pow(b, 3) / 3) - (Math.pow(a, 3) / 3);
    }

    function calculate() {
        // 1. Get input values
        const type = document.getElementById('type').value;
        const a = parseFloat(document.getElementById('a').value);
        const b = parseFloat(document.getElementById('b').value);
        const n = parseInt(document.getElementById('n').value);

        if (isNaN(a) || isNaN(b) || isNaN(n) || n <= 0) {
            alert("Please enter valid numerical inputs.");
            return;
        }
        if (a >= b) {
            alert("The lower x value (a) must be less than the higher x value (b).");
            return;
        }

        const dx = (b - a) / n;
        let approxSum = 0;

        // Data array to map visual paths for rectangles/trapezoids
        let shapesData = []; 

        // 2. Compute Approximation Mathematics
        if (type === 'TRAP') {
            // Trapezoidal Rule logic
            approxSum += f(a) / 2;
            for (let i = 1; i < n; i++) {
                approxSum += f(a + i * dx);
            }
