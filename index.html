<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riemann Sum Calculator (f(x) = x²)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        .function-display {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #16a085;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        button:hover {
            background-color: #2980b9;
        }
        #results, #prompt-box {
            display: none;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .result-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            border-left: 4px solid #3498db;
        }
        .result-card h3 {
            margin: 0 0 5px 0;
            font-size: 0.9rem;
            color: #7f8c8d;
            text-transform: uppercase;
        }
        .result-card p {
            margin: 0;
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .graph-container {
            position: relative;
            margin-bottom: 25px;
            height: 400px;
        }
        #reset-btn {
            background-color: #2ecc71;
        }
        #reset-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Riemann Sum Visualizer</h1>
    <div class="function-display">Target Function: f(x) = x²</div>

    <div id="input-section">
        <div class="input-group">
            <label for="type">Approximation Type:</label>
            <select id="type">
                <option value="LRAM">LRAM (Left Riemann Sum)</option>
                <option value="RRAM">RRAM (Right Riemann Sum)</option>
                <option value="MRAM">MRAM (Midpoint Riemann Sum)</option>
                <option value="TRAP">Trapezoidal Rule</option>
            </select>
        </div>

        <div class="input-group">
            <label for="a">Lower x value (a):</label>
            <input type="number" id="a" value="0" step="any">
        </div>

        <div class="input-group">
            <label for="b">Upper x value (b):</label>
            <input type="number" id="b" value="4" step="any">
        </div>

        <div class="input-group">
            <label for="n">Number of Subdivisions (n):</label>
            <input type="number" id="n" value="4" min="1" step="1">
        </div>

        <button id="calculate-btn" onclick="calculate()">Calculate & Graph</button>
    </div>

    <div id="results">
        <h2>Results</h2>
        <div class="results-grid">
            <div class="result-card">
                <h3>Approximation</h3>
                <p id="approx-val">0.000000</p>
            </div>
            <div class="result-card" style="border-left-color: #2ecc71;">
                <h3>Actual Value</h3>
                <p id="exact-val">0.000000</p>
            </div>
            <div class="result-card" style="border-left-color: #e74c3c;">
                <h3>Absolute Error</h3>
                <p id="error-val">0.000000</p>
            </div>
        </div>

        <div class="graph-container">
            <canvas id="riemannChart"></canvas>
        </div>
    </div>

    <div id="prompt-box">
        <p style="text-align: center; font-weight: bold; font-size: 1.1rem;">Would you like to try out another approximation?</p>
        <button id="reset-btn" onclick="resetPage()">Yes</button>
    </div>
</div>

<script>
    let chartInstance = null;

    // Define target function: f(x) = x^2
    function f(x) {
        return x * x;
    }

    // Exact definite integral of x^2 from a to b
    function exactIntegral(a, b) {
        return (Math.pow(b, 3) / 3) - (Math.pow(a, 3) / 3);
    }

    function calculate() {
        const type = document.getElementById('type').value;
        const a = parseFloat(document.getElementById('a').value);
        const b = parseFloat(document.getElementById('b').value);
        const n = parseInt(document.getElementById('n').value);

        if (isNaN(a) || isNaN(b) || isNaN(n) || n <= 0) {
            alert("Please enter valid numerical inputs.");
            return;
        }
        if (a >= b) {
            alert("The lower x value (a) must be less than the higher x value (b).");
            return;
        }

        const dx = (b - a) / n;
        let approxSum = 0;
        let shapesData = []; 

        // Math logic processing and shape construction
        if (type === 'TRAP') {
            // Trapezoidal Rule logic
            approxSum += f(a) / 2;
            for (let i = 1; i < n; i++) {
                approxSum += f(a + i * dx);
            }
            approxSum += f(b) / 2;
            approxSum *= dx;

            // Build individual closed trapezoids separated by null breaks to draw individual border outlines
            for (let i = 0; i < n; i++) {
                let xLeft = a + i * dx;
                let xRight = a + (i + 1) * dx;
                
                shapesData.push({x: xLeft, y: 0});
                shapesData.push({x: xLeft, y: f(xLeft)});
                shapesData.push({x: xRight, y: f(xRight)});
                shapesData.push({x: xRight, y: 0});
                shapesData.push({x: xLeft, y: 0});   // Closes the base floor loop
                shapesData.push({x: null, y: null}); // Pen lift break forces individual borders
            }

        } else {
            // Riemann Rectangles (LRAM, RRAM, MRAM)
            for (let i = 0; i < n; i++) {
                let xLeft = a + i * dx;
                let xRight = a + (i + 1) * dx;
                let evalX;

                if (type === 'LRAM') evalX = xLeft;
                else if (type === 'RRAM') evalX = xRight;
                else if (type === 'MRAM') evalX = xLeft + dx / 2;

                let height = f(evalX);
                approxSum += height * dx;

                // Build individual closed rectangles separated by null breaks
                shapesData.push({x: xLeft, y: 0});
                shapesData.push({x: xLeft, y: height});
                shapesData.push({x: xRight, y: height});
                shapesData.push({x: xRight, y: 0});
                shapesData.push({x: xLeft, y: 0});   // Closes the base floor loop
                shapesData.push({x: null, y: null}); // Pen lift break forces individual borders
            }
        }

        const exact = exactIntegral(a, b);
        const error = Math.abs(exact - approxSum);

        // Update Results Section
        document.getElementById('approx-val').innerText = approxSum.toFixed(6);
        document.getElementById('exact-val').innerText = exact.toFixed(6);
        document.getElementById('error-val').innerText = error.toFixed(6);

        // UI management
        document.getElementById('calculate-btn').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('prompt-box').style.display = 'block';

        // Generate Graph
        renderGraph(a, b, shapesData);
    }

    function resetPage() {
        document.getElementById('results').style.display = 'none';
        document.getElementById('prompt-box').style.display = 'none';
        document.getElementById('calculate-btn').style.display = 'block';
        if (chartInstance) {
            chartInstance.destroy();
            chartInstance = null;
        }
    }

    function renderGraph(a, b, shapesData) {
        let curveData = [];
        let padding = (b - a) * 0.1; 
        let startX = a - padding;
        let endX = b + padding;
        let steps = 100;
        
        for (let i = 0; i <= steps; i++) {
            let x = startX + (i * (endX - startX) / steps);
            curveData.push({x: x, y: f(x)});
        }

        const ctx = document.getElementById('riemannChart').getContext('2d');

        if (chartInstance) {
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [
                    {
                        label: 'f(x) = x²',
                        data: curveData,
                        showLine: true,
                        borderColor: '#e74c3c',
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        label: 'Approximation Subdivisions',
                        data: shapesData,
                        showLine: true,
                        borderColor: '#2980b9', // Strong blue line for structural boundaries
                        backgroundColor: 'rgba(52, 152, 219, 0.4)', // Soft transparent blue tint fill
                        borderWidth: 2, // Thickness of the blue divider lines
                        pointRadius: 0,
                        fill: true 
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'linear',
                        position: 'bottom',
                        title: { display: true, text: 'X Axis' }
                    },
                    y: {
                        title: { display: true, text: 'Y Axis' },
                        min: 0
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                if (!context.raw || isNaN(context.raw.y) || context.raw.y === null) return null;
                                return `(x: ${context.raw.x.toFixed(3)}, y: ${context.raw.y.toFixed(3)})`;
                            }
                        }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
